services:
  postgres:
    image: postgres:16-alpine
    container_name: eduportal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: eduportal
      POSTGRES_PASSWORD: eduportal
      POSTGRES_DB: eduportal
    # Host 5433 avoids clashing with a local PostgreSQL install (often uses 5432 on Windows).
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eduportal -d eduportal"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: eduportal-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  redis_data:
